name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user slither-analyzer
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Show Slither version
        run: slither --version

      - name: Build changed file list for quality gate
        run: |
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" > .quality-gate-changed-files
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1..HEAD > .quality-gate-changed-files
          else
            git ls-files > .quality-gate-changed-files
          fi
          echo "Changed files:"
          sed -n '1,200p' .quality-gate-changed-files

      - name: Run quality gate
        env:
          QUALITY_GATE_MODE: ci
          QUALITY_GATE_FILE_LIST: .quality-gate-changed-files
        run: npm run quality:gate
